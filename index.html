<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>One Question ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffe6ef,#fff0f5);
}

/* Hearts container */
#hearts {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
}

.heart {
    position: absolute;
    color: #ff4f87;
    font-size: 20px;
    animation: floatUp 6s linear forwards;
}

@keyframes floatUp {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}

/* Card */
.card {
    position: relative;
    z-index: 10;
    text-align: center;
    background: white;
    padding: 30px;
    margin: auto;
    margin-top: 15vh;
    border-radius: 20px;
    max-width: 420px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Buttons */
button {
    padding: 12px 20px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

#yes {
    background: #ff4f87;
    color: white;
}

#no {
    background: #ddd;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div id="hearts"></div>

<div class="card">
    <h2>I have something to ask you...</h2>
    <h1>Will you go on a date with me? ❤️</h1>

    <p>Select where we should go:</p>

    <select id="city">
        <option value="Vilnius">Vilnius 💛</option>
        <option value="Kaunas">Kaunas 🌆</option>
        <option value="Palanga">Palanga 🌊</option>
    </select>

    <br>

    <button id="yes">Yes ❤️</button>
    <button id="no">No 😢</button>
</div>

<div id="result" class="hidden"></div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const noBtn = document.getElementById("no");
    const yesBtn = document.getElementById("yes");
    const result = document.getElementById("result");
    const heartsContainer = document.getElementById("hearts");

    // ---------------- HEARTS ----------------
    function createHeart() {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.top = "100vh";

        // SAFE CHECK (this fixes your error)
        if (heartsContainer) {
            heartsContainer.appendChild(heart);
        }

        setTimeout(() => heart.remove(), 6000);
    }

    setInterval(createHeart, 400);

    // ---------------- NO BUTTON ----------------
    let dodgeCount = 0;
    const texts = ["No 😢", "Maybe? 🤔", "Come on 😄", "Just say yes ❤️"];

    noBtn.addEventListener("mouseover", () => {
        dodgeCount++;

        noBtn.style.position = "absolute";
        noBtn.style.left = Math.random() * 80 + "%";
        noBtn.style.top = Math.random() * 80 + "%";

        noBtn.innerText = texts[dodgeCount % texts.length];

        yesBtn.style.transform = `scale(${1 + dodgeCount * 0.08})`;
    });

    // ---------------- YES BUTTON ----------------
    yesBtn.addEventListener("click", () => {

        const city = document.getElementById("city").value;

        document.querySelector(".card").style.display = "none";
        result.classList.remove("hidden");

        result.innerHTML = `
            <div style="
                height:100vh;
                display:flex;
                flex-direction:column;
                justify-content:center;
                align-items:center;
                text-align:center;
                background:linear-gradient(135deg,#ffe6ef,#fff0f5);
                font-family:Arial;
            ">
                <h1 style="font-size:50px;">YAY!! ❤️🎉</h1>
                <h2 style="font-size:32px;">${city}</h2>
                <p style="font-size:20px;">July 24 – July 26</p>
                <p style="font-size:24px;font-weight:bold;">
                    Atšvęskim mūsų diena ❤️
                </p>
                <p>Can't wait for us 💖</p>
            </div>
        `;
    });

});
</script>

</body>
</html>
