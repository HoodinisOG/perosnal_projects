<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>One Question ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffe6ef,#fff0f5);
}

/* Floating hearts container */
#hearts {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
}

.heart {
    position: absolute;
    color: #ff4f87;
    animation: floatUp 6s linear forwards;
    opacity: 0.7;
}

@keyframes floatUp {
    from { transform: translateY(100vh) scale(0.5); }
    to { transform: translateY(-10vh) scale(1.2); }
}

/* Main card */
.card {
    position: relative;
    z-index: 10;
    text-align: center;
    background: white;
    padding: 30px;
    margin: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,.15);
    max-width: 420px;
    margin: auto;
    margin-top: 15vh;
}

/* Buttons */
button {
    padding: 14px 28px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
}

#yes {
    background: #ff4f87;
    color: white;
}

#no {
    background: #ddd;
}

/* Hidden */
.hidden {
    display: none;
}
</style>
</head>

<body>

<!-- FLOATING HEARTS -->
<div id="hearts"></div>

<!-- MAIN CARD -->
<div class="card">
    <h2>I have something to ask you...</h2>
    <h1>Will you go on a date with me? ❤️</h1>

    <p>Select where we should go:</p>

    <select id="city">
        <option value="Vilnius">Vilnius 💛</option>
        <option value="Kaunas">Kaunas 🌆</option>
        <option value="Palanga">Palanga 🌊</option>
    </select>

    <div>
        <button id="yes">Yes ❤️</button>
        <button id="no">No 😢</button>
    </div>
</div>

<!-- RESULT SCREEN -->
<div id="result" class="hidden"></div>

<!-- MUSIC (optional: add music.mp3 to repo) -->
<audio id="music" loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<!-- CONFETTI -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const noBtn = document.getElementById("no");
    const yesBtn = document.getElementById("yes");
    const result = document.getElementById("result");
    const music = document.getElementById("music");
    const hearts = document.getElementById("hearts");

    // ---------- FLOATING HEARTS ----------
    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (10 + Math.random() * 20) + "px";
        heart.style.top = "100vh";

        hearts.appendChild(heart);

        setTimeout(() => heart.remove(), 6000);
    }
    setInterval(createHeart, 300);

    // ---------- NO BUTTON ESCAPE ----------
    let dodgeCount = 0;
    const texts = ["No 😢", "Maybe? 🤔", "Come on 😄", "Just say yes ❤️"];

    noBtn.addEventListener("mouseover", () => {
        dodgeCount++;

        noBtn.style.position = "absolute";
        noBtn.style.left = Math.random() * 80 + "%";
        noBtn.style.top = Math.random() * 80 + "%";

        noBtn.innerText = texts[dodgeCount % texts.length];

        yesBtn.style.transform = `scale(${1 + dodgeCount * 0.08})`;
    });

    // ---------- YES CLICK ----------
    yesBtn.addEventListener("click", () => {

        const city = document.getElementById("city").value;

        document.querySelector(".card").style.display = "none";
        result.classList.remove("hidden");

        result.innerHTML = `
            <div style="
                height:100vh;
                display:flex;
                flex-direction:column;
                justify-content:center;
                align-items:center;
                text-align:center;
                font-family:Arial;
                background:linear-gradient(135deg,#ffe6ef,#fff0f5);
            ">
                <h1 style="font-size:50px;">YAY!! ❤️🎉</h1>
                <h2 style="font-size:32px;">${city} 💕</h2>
                <p style="font-size:20px;">July 24 – July 26</p>
                <p style="font-size:24px;font-weight:bold;">
                    Atšvęskim mūsų diena ❤️
                </p>
                <p>Can't wait for us 💖</p>
            </div>
        `;

        // confetti
        if (typeof confetti === "function") {
            confetti({
                particleCount: 250,
                spread: 120,
                origin: { y: 0.6 }
            });
        }

        // music
        music.play().catch(() => {});
    });

    // ---------- AUTO MUSIC ----------
    document.body.addEventListener("click", () => {
        music.play().catch(() => {});
    }, { once: true });

});
</script>

</body>
</html>
