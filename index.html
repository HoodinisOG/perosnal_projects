<script>

window.addEventListener("DOMContentLoaded", () => {

    // ---------- SAFE ELEMENT CHECK ----------
    const noBtn = document.getElementById("no");
    const yesBtn = document.getElementById("yes");
    const result = document.getElementById("result");
    const music = document.getElementById("music");
    const heartsContainer = document.getElementById("hearts");

    if (!noBtn || !yesBtn || !result) {
        console.error("Missing required HTML elements!");
        return;
    }

    // ---------- FLOATING HEARTS (SAFE) ----------
    function createHeart() {
        if (!heartsContainer) return;

        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";

        heart.style.position = "absolute";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (10 + Math.random() * 20) + "px";
        heart.style.top = "100vh";
        heart.style.animation = "floatUp 6s linear forwards";

        heartsContainer.appendChild(heart);

        setTimeout(() => heart.remove(), 6000);
    }

    setInterval(createHeart, 300);

    // ---------- NO BUTTON ----------
    let dodgeCount = 0;
    const texts = ["No 😢", "Maybe? 🤔", "Come on 😄", "Just say yes ❤️"];

    noBtn.addEventListener("mouseover", () => {
        dodgeCount++;

        noBtn.style.position = "absolute";
        noBtn.style.left = Math.random() * 80 + "%";
        noBtn.style.top = Math.random() * 80 + "%";

        noBtn.innerText = texts[dodgeCount % texts.length];

        yesBtn.style.transform = `scale(${1 + dodgeCount * 0.08})`;
    });

    // ---------- YES BUTTON ----------
    yesBtn.addEventListener("click", () => {

        const cityEl = document.getElementById("city");
        const city = cityEl ? cityEl.value : "our special place";

        document.querySelector(".card").style.display = "none";
        result.classList.remove("hidden");

        result.innerHTML = `
            <div style="
                display:flex;
                height:100vh;
                width:100%;
                justify-content:center;
                align-items:center;
                flex-direction:column;
                background:linear-gradient(135deg,#ffe6ef,#fff0f5);
                text-align:center;
                font-family:Arial;
            ">
                <h1 style="font-size:48px;">YAY!! ❤️🎉</h1>
                <h2 style="font-size:32px;">${city} 💕</h2>
                <p style="font-size:20px;">July 24 – July 26</p>
                <p style="font-size:24px;font-weight:bold;">
                    Atšvęskim mūsų diena ❤️
                </p>
                <p style="font-size:18px;">Can't wait for us 💖</p>
            </div>
        `;

        // confetti SAFE CHECK
        if (typeof confetti === "function") {
            confetti({
                particleCount: 250,
                spread: 120,
                origin: { y: 0.6 }
            });
        }

        // music SAFE
        if (music) {
            music.play().catch(() => {});
        }
    });

    // ---------- MUSIC ON FIRST CLICK ----------
    document.body.addEventListener("click", () => {
        if (music) music.play().catch(() => {});
    }, { once: true });

});

</script>
