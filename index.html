<script>

// ---------- FLOATING HEARTS ----------
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.position = "absolute";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (10 + Math.random() * 20) + "px";
    heart.style.top = "100vh";
    heart.style.animation = "floatUp 6s linear forwards";
    document.getElementById("hearts").appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 300);

// ---------- ELEMENTS ----------
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const result = document.getElementById("result");
const music = document.getElementById("music");

// ---------- NO BUTTON ESCAPE ----------
let dodgeCount = 0;

const texts = ["No 😢", "Maybe? 🤔", "Come on 😄", "Just say yes ❤️"];

noBtn.addEventListener("mouseover", () => {
    dodgeCount++;

    noBtn.style.position = "absolute";
    noBtn.style.left = Math.random() * 80 + "%";
    noBtn.style.top = Math.random() * 80 + "%";

    noBtn.innerText = texts[dodgeCount % texts.length];

    yesBtn.style.transform = `scale(${1 + dodgeCount * 0.08})`;
});

// ---------- YES CLICK ----------
yesBtn.addEventListener("click", () => {

    const city = document.getElementById("city").value;

    // hide main card
    document.querySelector(".card").style.display = "none";

    // show result
    result.classList.remove("hidden");

    // FULL YAY SCREEN (dynamic)
    result.innerHTML = `
        <div style="
            display:flex;
            height:100vh;
            width:100%;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            background:linear-gradient(135deg,#ffe6ef,#fff0f5);
            text-align:center;
            font-family:Arial;
        ">
            <h1 style="font-size:48px;">YAY!! ❤️🎉</h1>
            <h2 style="font-size:32px;">${city} 💕</h2>
            <p style="font-size:20px;">July 24 – July 26</p>
            <p style="font-size:24px;font-weight:bold;">
                Atšvęskim mūsų diena ❤️
            </p>
            <p style="font-size:18px;">Can't wait for us 💖</p>
        </div>
    `;

    // confetti
    confetti({
        particleCount: 250,
        spread: 120,
        origin: { y: 0.6 }
    });

    // music
    music.play().catch(() => {});
});

// ---------- AUTO MUSIC ON FIRST TOUCH ----------
document.body.addEventListener("click", () => {
    music.play().catch(() => {});
}, { once: true });

</script>
